front:
  text: 太古經序夫至道無言真空非色思之者莫能知觀之者不可見𦣱之不可得行之不能到陶鑄天地率循造化寂而不動應滿六虛令萬物蒙休羣生復命巍巍乎至矣哉非聖人孰能通之者耶況元始天尊慈心廣布慧照十方觀見衆生忘歸失本宛轉世間輪回不息長劫受苦不能自明遂感法雨敷滋宣揚妙道引接有情出生死海遊清虛之境恬淡之鄉超乎塵垢步乎寥廓逍遙獨化微妙玄通無為自然返於純素冥極混茫者也元始天尊説太古經注
  hash: sha256:67a7b36163a60fd7e45088ea3489c518f573f08f80c494bdb2a2a61d50a8d11b
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5a0103_HFL_000-001a, image: hfl/0050/0050-182.png}
body:
  text: 龜山長筌子注元者氣之先也始者物之初也是以虛無自然清淨無為包羅衆妙應接羣生故曰元始者也天尊者上玄至極髙明貴真三界之主天人之師幽贊德號之所稱也説者宣述敷演也造作遷流也慈雲覆布法雨垂滋普潤羣情善芽增長太古者無名無象不變不遷虛空同體歷劫長存先天地而不為老後六極而不為下寂兮寥兮獨立而不攺經隂陽而不殆不生不死無往無來卓然安靜矣元始天尊大發慈悲之行廣開方便之門宣揚妙旨述作微言救度蒼生悉除衆苦經者非俗談鄙語之稱乃妙法真常之異號總善之要徑入聖之階梯是逍遙之正路平坦之玄途廣莫之野無何有之鄉古今達士無不遊兹若苦海衆生素藴仙風宿有靈骨遇此金文一聞解脫捐諸業縳逺離煩惱優遊方外詎不幸哉天尊曰夫聖人垂教若天行四時率信而善應也語若樞機正如號今發而直截無不中也出而威明無不當也譬如良藥玉漿大明之燈能治衆生一切苦疾能破羣迷黑暗癡業言勝金石動若春風激悟凡夫頓開心地榮通萬化各復其根引接世人解冤釋縳出離生死超脫有無遊於大道奚不至矣哉有動之動在乎無動有動者應機也無動者抱元守一也歸根復命也故經云清者濁之源靜者動之基唯精唯一允執厥中夫物藝藝各復歸其根歸根曰靜至靜不動也有為之為在乎無為神本湛寂感而遂通不得已而後起隨機接物妙用無窮去智與仁故循天之理淡然無極而衆妙歸之氣住則萬物皆生專氣致柔能如嬰兒抱守沖和真氣氤氲萬物皆長生也知和曰常心使氣曰強強者堅強壯老死之徒也氣泯則萬物皆滅氣絶神逝九竅百骸變滅塵土也更何疑之物物相資固飬其根以虛養虛以實養實何以故忘形養氣忘氣養神忘神飬虛虛室生白吉祥止止神氣沖寧靈根深固故成長生久視之道也默而悟之我自植之至道至玄不假外物而得默默昏昏無應無問靈光獨耀迥脫根塵體露真常不隨萬法可以全生可以復本也出乎無間無間者無有也是不言之教無為之益圎通無礙應化無窮遍滿十方時時運動無有間斷也不死不生玄珠燦燦今古常明萬物混成法法平等非靜非染無始無終故曰不死不生者也與天地為一者哉天道清虛所以能長地道寧靜所以能久人能悟理達其妙道致虛極守靜篤恬淡寂然不為萬物之所纍清靜無為可以與天地為一者哉天尊曰天尊者人人本有箇箇具足蓋謂衆生緣薄福鮮煩惱障蔽迷情重濁不悟真源雖遇明師不信不曉忘於目則光溢無極五色亂明令人目盲色者彰也色色者未嘗顯何謂也法眼圓通明照十方三界觀物無物觀空不空視之冥冥杳冥之中獨見曉焉靈光充塞無窮極也泯於耳則心識常淵五音亂聰令人耳聾心是清淵本自湛澄是非言語美惡聲音皆為妄情偽物飄風驟雨動擾心源神室不靈若能泯絶是非不受於中無聲之中獨聞和焉然後可以聽玄歌白雪不鼓陽春仙音之曲調也兩機俱忘是謂太玄聲色雙泯動靜兩忘聽之不以氣視之不以神是謂太玄之妙虛曠之靈深之又深而能物焉神之又神而能精焉無為之為不知而知靈明曠徹廣大虛寂妙無邊際也混混沌沌合乎大方物我俱忘有無不立昏昏默默杳杳冥冥無邊無際非外非中其遊無端其出無方化育萬物不可為象混成無方隅也溟溟涬涬合乎無倫至道重玄浩浩蕩蕩理無等倫藏之則為元精用之則為萬靈含之則為太一放之則為太清無相無名至尊至貴迷之則凡夫悟之則聖賢天地之大我之無盈古今聖賢得道真人提挈天地把握隂陽雕琢萬物澤及羣品不為難乎萬物之衆我之所持宇宙在乎其手萬化生乎一身曷有窮終以語其弊哉聖人直説妙道普現普光惟恐後世凡夫不信疑惑大發謙辭若言不盡其理以語為弊惡舛訛之説也天尊曰天尊者微妙玄通深不可識故曰口帶玄而無路舌頭談而不談養其真火身乃長存真氣薰蒸而時無寒暑純陽流注而民無死生故曰心燈朗照法身長存慧燭不明道容豈載固其真水體乃長在天地相合以降甘露滋榮羣品人能安靜和暢寶甁堅固玉漿香美真水下降滋養妙體返老如童孩不亦善乎真真相濟故曰長生水火既濟魂魄相守鉛汞相凝鍊成大藥結就金丹燦爛光輝無幽不燭純白入素無為復朴長生不滅沒身不殆號曰真人者也天得其真故長天得純粹不雜之道則故能覆蓋羣有色羅萬象歷劫清凝鑒物無私不言而應妙用無窮髙虛長逺大無不包久而不易也地得其真故久地得其真則育養萬物深根固蒂安靜無為乃長久也人得其真故壽死而不亡者壽但世人悟其真趣得其妙元與道合真沒身不殆同其聖賢令後代祭祀不輟何以加此焉世人所以不得長久者養其外五味濁口五臭熏鼻聲色閼塞耳目取捨滑心使性飛揚迷情徇物念念相攖使心智遊乎外鬼神入其內是非寵辱亂擾靈源與物相刃相靡終身疲役區區業網而不知其歸可不悲乎身適美厚錦繡羅縠意迷邪見顚倒妄想至於窮年不知天命喪己於物失性於俗者謂之倒置之民可不哀哉壞其內也內本清靜光明虛白晃耀奈何愛染萬緣不生返照飄飄一性之散沉沉萬劫之迷難省真身遷於别蛻迷其真源壞其內也萬劫輪回生死海中不能超度甚可哀憐矣長生之道體露真常不拘文字心性無染本自圓成但離妄緣長生之道得之可矣不視不聽不視不聽者隳其肢體黜其聰明外不觀乎宇宙內不知有太初不登昆崘不遊太虛坐忘遺照合乎洞玄同而無好化而無常希夷微妙不可測量耳不華不榮不利貨財不近富貴不苟於人不飾於物衆人熙熙我獨怕兮衆人昭昭我獨若昏捐名忘勢全身遠害乃合天道也棄世離俗不尊顯於市朝不困囚於妻子如孤雲野鶴飛騰自在舒卷無心乃修真之士也積精全神賢人尚志聖人貴精內以沖和之氣飬神外以諸聖妙法以滋慧命內外瑩徹覺性圓明心境俱忘頓超諸漏體此法乃可修持也寂寞無為無為者無不為也恬淡無為乃合天德故曰無不忘也無不有也淡然無極而衆美從之故曰寂寞恬淡虛無無為乃天地之平道德之質也故聖人恬淡矣平易矣平易恬淡則哀樂不能入邪氣不能襲其神不虧故其德全靜一而不變也故一切賢聖其道密庸不以無為法而有成聖功者理未聞也乃得道矣夫道者有情有信無為無形可傳不可得可受不可見先天地而生生而無名然未嘗生也後今古而存存而無象然未嘗存也故曰不可思議既不可致詰思惟何以得之衆生但能心境兩忘一念不生呼吸屈伸躇步跐蹈不知是誰更休得携燈問火涉水尋津頓悟本心即得道矣兹為衆生即説偈曰天尊宣祕密方便示慈悲法雨滋羣品玄談釋衆疑觀凡如夢幻引接悟希夷水火歸爐竈雲霞罩坎離沖虛通聖道清靜結靈芝物得能長久人行絶禍危逍遙三界外永永證無為元始天尊説太古經注
